mode: standalone

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 20Gi
  storageClass: "local-path"

# Credentials managed via existingSecret (sealed-secret-minio-credentials)
# rootUser / rootPassword intentionally omitted

buckets:
  - name: filesync
    policy: none
    purge: false

consoleIngress:
  enabled: false
