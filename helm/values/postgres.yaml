auth:
  database: filesync
  username: filesync
  # Password managed via sealed secret (sealed-secret-db-credentials)
  existingSecret: "filesync-db-credentials"

primary:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "local-path"

metrics:
  enabled: true
