apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filesync-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    tailscale.com/expose: "true"
    tailscale.com/hostname: "filesync"
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - filesync.homelab.local
      secretName: filesync-tls
  rules:
    - host: filesync.homelab.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: filesync-api
                port:
                  name: http
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: filesync-api
                port:
                  name: http
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: filesync-api
                port:
                  name: http
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: filesync-api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filesync-web
                port:
                  name: http
