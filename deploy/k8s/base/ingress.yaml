apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filesync-ingress
  namespace: default
  annotations:
    tailscale.com/hostname: "filesync"
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: filesync-api
                port:
                  name: http
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: filesync-api
                port:
                  name: http
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: filesync-api
                port:
                  name: http
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: filesync-api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filesync-web
                port:
                  name: http
