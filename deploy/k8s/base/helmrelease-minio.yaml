apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: storage
  install:
    createNamespace: true
  chart:
    spec:
      chart: minio
      version: ">=5.0.0"
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
      interval: 10m
  values:
    mode: standalone

    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    persistence:
      enabled: true
      size: 20Gi
      storageClass: "local-path"

    existingSecret: minio-credentials

    buckets:
      - name: filesync
        policy: none
        purge: false

    consoleIngress:
      enabled: false
