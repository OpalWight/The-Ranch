apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: filesync-redis-trigger-auth
  namespace: default
spec:
  secretTargetRef:
    - parameter: password
      name: filesync-redis-credentials
      key: REDIS_PASSWORD
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: filesync-worker
  namespace: default
  labels:
    app: filesync
    component: worker
spec:
  scaleTargetRef:
    name: filesync-worker
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: redis-streams
      metadata:
        address: cache-redis-master.cache.svc.cluster.local:6379
        stream: filesync:tasks
        consumerGroup: filesync-workers
        lagCount: "10"
      authenticationRef:
        name: filesync-redis-trigger-auth
