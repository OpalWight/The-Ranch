---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: filesync-api
  namespace: flux-system
spec:
  image: ghcr.io/opalwight/the-ranch/api
  interval: 5m
  secretRef:
    name: ghcr-auth
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: filesync-worker
  namespace: flux-system
spec:
  image: ghcr.io/opalwight/the-ranch/worker
  interval: 5m
  secretRef:
    name: ghcr-auth
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: filesync-web
  namespace: flux-system
spec:
  image: ghcr.io/opalwight/the-ranch/web
  interval: 5m
  secretRef:
    name: ghcr-auth
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: filesync-api
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: filesync-api
  filterTags:
    pattern: '^[0-9a-f]{7,40}$'
  policy:
    alphabetical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: filesync-worker
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: filesync-worker
  filterTags:
    pattern: '^[0-9a-f]{7,40}$'
  policy:
    alphabetical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: filesync-web
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: filesync-web
  filterTags:
    pattern: '^[0-9a-f]{7,40}$'
  policy:
    alphabetical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: filesync
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxcdbot
        email: fluxcdbot@users.noreply.github.com
      messageTemplate: 'chore: update images {{range .Changed.Changes}}{{print .OldValue}} -> {{print .NewValue}} {{end}}'
    push:
      branch: main
  update:
    path: ./deploy/k8s/overlays/homelab
    strategy: Setters
