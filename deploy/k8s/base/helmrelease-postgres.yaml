apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: postgres
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: database
  install:
    createNamespace: true
  chart:
    spec:
      chart: postgresql
      version: ">=12.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 10m
  values:
    auth:
      database: filesync
      username: filesync
      existingSecret: ""
      password: "changeme-use-sealed-secrets-later"
    primary:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      persistence:
        enabled: true
        size: 5Gi
        storageClass: "local-path"
    metrics:
      enabled: true
