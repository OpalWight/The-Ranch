apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: tailscale-system
  install:
    createNamespace: true
  chart:
    spec:
      chart: tailscale-operator
      version: ">=1.76.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
      interval: 1h
  values:
    oauthSecretVolume:
      secret:
        secretName: tailscale-operator-oauth
    operatorConfig:
      defaultTags:
        - "tag:k8s-operator"
