apiVersion: apps/v1
kind: Deployment
metadata:
  name: filesync-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filesync
      component: web
  template:
    metadata:
      labels:
        app: filesync
        component: web
    spec:
      containers:
        - name: web
          image: the-ranch-web:latest
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      imagePullSecrets:
        - name: ghcr-auth
