apiVersion: apps/v1
kind: Deployment
metadata:
  name: filesync-api
  labels:
    app: filesync
    component: api
spec:
  selector:
    matchLabels:
      app: filesync
      component: api
  template:
    metadata:
      labels:
        app: filesync
        component: api
    spec:
      initContainers:
        - name: migrate
          image: migrate/migrate:latest
          args:
            - "-path=/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"
          envFrom:
            - secretRef:
                name: filesync-db-credentials
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      containers:
        - name: api
          image: the-ranch:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: filesync-db-credentials
            - secretRef:
                name: filesync-minio-credentials
            - secretRef:
                name: filesync-redis-credentials
            - configMapRef:
                name: filesync-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: migrations
          configMap:
            name: filesync-migrations
