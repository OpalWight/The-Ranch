apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: cache
  install:
    createNamespace: true
  chart:
    spec:
      chart: redis
      version: ">=18.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 10m
  values:
    architecture: standalone
    auth:
      enabled: true
      password: "changeme-use-sealed-secrets-later"
    master:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      persistence:
        enabled: true
        size: 1Gi
        storageClass: "local-path"
    metrics:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
