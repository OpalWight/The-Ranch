services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: filesync
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: filesync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: changeme
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass changeme
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    group_add:
      - "${DOCKER_GID}"
    network_mode: host  # Access k3s API at 127.0.0.1:6443 directly
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/casc.yaml:/var/jenkins_casc/casc.yaml:ro
    environment:
      JAVA_OPTS: "-Xmx1g"
      CASC_JENKINS_CONFIG: /var/jenkins_casc/casc.yaml
      JENKINS_ADMIN_USER: "${JENKINS_ADMIN_USER:-admin}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD:-changeme}"
      JENKINS_URL: "${JENKINS_URL:-http://localhost:8080/}"
      GHCR_USERNAME: "${GHCR_USERNAME}"
      GHCR_TOKEN: "${GHCR_TOKEN}"
      KUBECONFIG_BASE64: "${KUBECONFIG_BASE64}"
      REPO_URL: "${REPO_URL:-https://github.com/OpalWight/The-Ranch.git}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET}"
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  redisdata:
  jenkins_home:
